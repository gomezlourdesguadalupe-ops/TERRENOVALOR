<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasación de Lotes · Macedo Propiedades</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --white:      #FFFFFF;
    --off-white:  #F7F9F7;
    --border:     #D8E8DC;
    --border-mid: #B2CFB9;
    --green-deep: #1A4D2E;
    --green-mid:  #1F5E3B;
    --green-soft: #2E7D4F;
    --green-tint: #EBF4EE;
    --green-tint2:#D4EADA;
    --ink:        #111811;
    --ink-mid:    #3D5040;
    --ink-soft:   #6B7E6F;
    --ink-ghost:  #9EB4A2;
    --warn:       #8B2E0F;
    --warn-tint:  #FFF5F2;
    --warn-border:#E8B4A0;
    --shadow-sm:  0 1px 4px rgba(26,77,46,.07);
    --shadow-md:  0 4px 20px rgba(26,77,46,.10);
    --shadow-lg:  0 8px 40px rgba(26,77,46,.13);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--white);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--white);
    border-bottom: 1.5px solid var(--border);
    padding: 0 48px;
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }

  .header-left {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .header-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--green-soft);
  }

  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--green-deep);
    letter-spacing: 0.01em;
    line-height: 1.1;
  }

  /* Logo */
  .logo-mp {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
  }

  .logo-mp img {
    height: 44px;
    width: auto;
    display: block;
  }

  .logo-mp svg {
    height: 44px;
    width: auto;
  }

  .logo-wordmark {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 1px;
  }

  .logo-name {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--green-deep);
  }

  .logo-sub {
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  /* ── Main layout ── */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 48px 80px;
    display: grid;
    grid-template-columns: 520px 1fr;
    gap: 40px;
    align-items: start;
  }

  /* ── Form column ── */
  .form-col {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── Section blocks ── */
  .form-section {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s ease;
  }

  .form-section:focus-within {
    box-shadow: var(--shadow-md);
    border-color: var(--border-mid);
  }

  .section-header {
    padding: 16px 22px 14px;
    background: var(--off-white);
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-icon {
    font-size: 16px;
    line-height: 1;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--green-mid);
  }

  .section-body {
    padding: 22px 22px 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Field ── */
  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .field label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-mid);
  }

  .field label .opt {
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    color: var(--ink-ghost);
    font-size: 11px;
  }

  input[type="number"],
  input[type="text"],
  input[type="date"],
  select {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink);
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--green-mid);
    background: var(--green-tint);
    box-shadow: 0 0 0 3px rgba(31,94,59,.10);
  }

  input::placeholder { color: var(--ink-ghost); }

  /* ── Checkbox ── */
  .checkbox-field {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .checkbox-field input[type="checkbox"] {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border-mid);
    border-radius: 4px;
    accent-color: var(--green-mid);
    cursor: pointer;
    flex-shrink: 0;
  }

  .checkbox-field span {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-mid);
  }

  /* ── Ghost buttons ── */
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .ghost-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    background: var(--white);
    border: 1.5px solid var(--border-mid);
    color: var(--ink-mid);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .ghost-btn:hover {
    border-color: var(--green-mid);
    color: var(--green-deep);
    background: var(--green-tint);
  }

  #zona-preview {
    font-size: 12px;
    color: var(--green-deep);
    font-weight: 500;
    min-height: 14px;
    padding: 4px 0;
    line-height: 1.6;
  }

  /* ── Submit button ── */
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--green-deep);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(26,77,46,.28);
    margin-top: 4px;
  }

  .submit-btn:hover {
    background: var(--green-mid);
    box-shadow: 0 6px 24px rgba(26,77,46,.36);
    transform: translateY(-1px);
  }

  .submit-btn:active { transform: translateY(0); }

  .submit-btn:disabled {
    background: var(--ink-ghost);
    box-shadow: none;
    cursor: wait;
    transform: none;
  }

  /* ── Result column ── */
  .result-col {
    position: sticky;
    top: 100px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .result-section {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .result-section .section-header {
    background: var(--off-white);
  }

  /* ── Empty state ── */
  .result-empty {
    padding: 48px 32px;
    text-align: center;
    color: var(--ink-ghost);
    font-size: 13px;
    line-height: 1.9;
  }

  .result-empty-icon {
    font-size: 32px;
    margin-bottom: 12px;
    display: block;
    opacity: 0.5;
  }

  /* ── Main result card ── */
  .result-main {
    padding: 28px 28px 22px;
  }

  .result-zone-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-tint);
    border: 1px solid var(--green-tint2);
    color: var(--green-deep);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 8px;
  }

  .result-zone-tag.warn {
    background: var(--warn-tint);
    border-color: var(--warn-border);
    color: var(--warn);
  }

  .tag-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .result-price-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }

  .result-total {
    font-family: 'DM Serif Display', serif;
    font-size: 52px;
    color: var(--green-deep);
    line-height: 1;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }

  .result-permil {
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 400;
  }

  .result-permil strong {
    color: var(--ink-mid);
    font-weight: 600;
  }

  /* ── Breakdown (terreno / construcción / total) ── */
  .breakdown {
    padding: 18px 28px 4px;
    border-top: 1.5px solid var(--border);
  }

  .breakdown-row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    font-size: 13px;
    color: var(--ink-soft);
  }

  .breakdown-row.principal {
    color: var(--green-deep);
    font-weight: 700;
    border-top: 1.5px solid var(--border);
    margin-top: 4px;
    padding-top: 10px;
    font-size: 14px;
  }

  /* ── Factors table ── */
  .factores-section {
    padding: 20px 28px 24px;
    border-top: 1.5px solid var(--border);
  }

  .factores-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 14px;
  }

  .factor-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .factor-row:last-child { border-bottom: none; }

  .factor-row .factor-name { color: var(--ink-mid); }

  .factor-row .val {
    font-weight: 600;
    font-size: 13px;
  }

  .factor-row .val.up   { color: var(--green-mid); }
  .factor-row .val.down { color: #C1521F; }
  .factor-row .val.neu  { color: var(--ink-soft); }

  .factor-row.total-row {
    background: var(--green-tint);
    margin: 8px -28px 0;
    padding: 10px 28px;
    border-bottom: none;
  }

  .factor-row.total-row .factor-name {
    font-weight: 700;
    color: var(--green-deep);
    font-size: 13px;
  }

  .factor-row.total-row .val {
    font-size: 15px;
    color: var(--green-deep);
  }

  /* ── Servicios chips ── */
  .servicios-section {
    padding: 18px 28px 22px;
    border-top: 1.5px solid var(--border);
  }

  .chip-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .chip {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 5px 11px;
    border-radius: 20px;
    border: 1px solid var(--green-tint2);
    background: var(--green-tint);
    color: var(--green-deep);
  }

  .chip.off {
    border-color: var(--warn-border);
    background: var(--warn-tint);
    color: var(--warn);
  }

  /* ── Disclaimer ── */
  .disclaimer {
    padding: 14px 28px;
    background: var(--off-white);
    border-top: 1.5px solid var(--border);
    font-size: 11px;
    color: var(--ink-soft);
    line-height: 1.7;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .disclaimer-icon { flex-shrink: 0; font-size: 14px; margin-top: 1px; }

  /* ── Comparables section ── */
  .comparables-body {
    padding: 20px 22px 22px;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.7;
  }

  .comparable-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .comparable-item:last-child { border-bottom: none; }

  .comparable-item .src {
    color: var(--green-deep);
    font-weight: 700;
    font-size: 12px;
  }

  .comparable-item .dir {
    color: var(--ink-mid);
  }

  .comparable-item .meta {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .mercado-diff {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--green-tint);
    color: var(--green-deep);
    font-size: 12px;
    font-weight: 600;
  }

  .mercado-diff.warn {
    background: var(--warn-tint);
    color: var(--warn);
  }

  /* ── Error ── */
  .error-block {
    padding: 20px 22px;
    background: var(--warn-tint);
    border: 1.5px solid var(--warn-border);
    border-radius: 10px;
    color: var(--warn);
    font-size: 13px;
    line-height: 1.7;
  }

  /* ── Responsive ── */
  @media (max-width: 980px) {
    main {
      grid-template-columns: 1fr;
      padding: 28px 24px 60px;
    }

    .result-col { position: static; }

    header { padding: 0 24px; }

    .logo-wordmark { display: none; }
  }

  @media (max-width: 560px) {
    .field-row { grid-template-columns: 1fr; }
    .result-total { font-size: 38px; }
    header { height: 64px; }
    .header-title { font-size: 18px; }
  }
</style>
</head>
<body>

<!-- ══════════════ HEADER ══════════════ -->
<header>
  <div class="header-left">
    <div class="header-eyebrow">N.º 01 · Modelo Estimativo</div>
    <div class="header-title">Tasación de Lotes</div>
  </div>

  <a class="logo-mp" href="#" title="Macedo Propiedades">
    <img src="/static/logo.png" alt="Macedo Propiedades" onerror="this.style.display='none'">
    <div class="logo-wordmark">
      <div class="logo-name">Macedo</div>
      <div class="logo-sub">Propiedades</div>
    </div>
  </a>
</header>

<!-- ══════════════ MAIN ══════════════ -->
<main>

  <!-- ── FORMULARIO ── -->
  <div class="form-col">
    <form id="form-tasacion">

      <!-- 📍 Ubicación -->
      <div class="form-section">
        <div class="section-header">
          <span class="section-icon">📍</span>
          <span class="section-label">Ubicación del lote</span>
        </div>
        <div class="section-body">
          <div class="field-row">
            <div class="field">
              <label>Latitud</label>
              <input type="number" step="any" id="lat" placeholder="-34.6037">
            </div>
            <div class="field">
              <label>Longitud</label>
              <input type="number" step="any" id="lon" placeholder="-58.3816">
            </div>
          </div>
          <div class="btn-row">
            <button type="button" class="ghost-btn" id="btn-geo">
              <span>⊙</span> Usar mi ubicación
            </button>
            <button type="button" class="ghost-btn" id="btn-ver-zonas">
              <span>⊞</span> Ver zonas cargadas
            </button>
          </div>
          <div id="zona-preview"></div>
        </div>
      </div>

      <!-- 📐 Características del lote -->
      <div class="form-section">
        <div class="section-header">
          <span class="section-icon">📐</span>
          <span class="section-label">Características del lote</span>
        </div>
        <div class="section-body">
          <div class="field">
            <label>Superficie total <span class="opt">(m²)</span></label>
            <input type="number" step="any" id="superficie" placeholder="300">
          </div>
          <div class="field-row">
            <div class="field">
              <label>Frente <span class="opt">(m)</span></label>
              <input type="number" step="any" id="frente" placeholder="12">
            </div>
            <div class="field">
              <label>Fondo <span class="opt">(m, opcional)</span></label>
              <input type="number" step="any" id="fondo" placeholder="25">
            </div>
          </div>
          <label class="checkbox-field">
            <input type="checkbox" id="esquina">
            <span>El lote está en esquina</span>
          </label>
        </div>
      </div>

      <!-- 🌊 Riesgo hídrico -->
      <div class="form-section">
        <div class="section-header">
          <span class="section-icon">🌊</span>
          <span class="section-label">Riesgo hídrico</span>
        </div>
        <div class="section-body">
          <div class="field">
            <label>¿El lote es inundable? <span class="opt">(opcional)</span></label>
            <select id="inundable">
              <option value="">— Usar el dato típico de la zona —</option>
              <option value="true">Sí, es inundable</option>
              <option value="false">No, no es inundable</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 🏡 Construcción -->
      <div class="form-section">
        <div class="section-header">
          <span class="section-icon">🏡</span>
          <span class="section-label">Construcción</span>
        </div>
        <div class="section-body">
          <label class="checkbox-field">
            <input type="checkbox" id="tiene-construccion">
            <span>El lote tiene una construcción</span>
          </label>
          <div class="field-row">
            <div class="field">
              <label>Superficie cubierta <span class="opt">(m², opcional)</span></label>
              <input type="number" step="any" id="sup-cubierta" placeholder="120">
            </div>
            <div class="field">
              <label>Año de construcción <span class="opt">(opcional)</span></label>
              <input type="number" step="1" id="anio-construccion" placeholder="2005" min="1900" max="2026">
            </div>
          </div>
          <div class="field">
            <label>Estado general</label>
            <select id="estado-construccion">
              <option value="excelente">Excelente</option>
              <option value="bueno" selected>Bueno</option>
              <option value="regular">Regular</option>
              <option value="malo">Malo / a demoler</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 🚰 Servicios -->
      <div class="form-section">
        <div class="section-header">
          <span class="section-icon">🚰</span>
          <span class="section-label">Servicios disponibles</span>
        </div>
        <div class="section-body">
          <div class="field-row">
            <label class="checkbox-field">
              <input type="checkbox" id="srv-agua">
              <span>Agua de red</span>
            </label>
            <label class="checkbox-field">
              <input type="checkbox" id="srv-luz">
              <span>Luz eléctrica</span>
            </label>
          </div>
          <div class="field-row">
            <label class="checkbox-field">
              <input type="checkbox" id="srv-gas">
              <span>Gas de red</span>
            </label>
            <label class="checkbox-field">
              <input type="checkbox" id="srv-cloaca">
              <span>Cloacas</span>
            </label>
          </div>
          <label class="checkbox-field">
            <input type="checkbox" id="srv-transporte">
            <span>Transporte público</span>
          </label>
        </div>
      </div>

      <!-- 📅 Fecha del dato -->
      <div class="form-section">
        <div class="section-header">
          <span class="section-icon">📅</span>
          <span class="section-label">Fecha del dato de zona</span>
        </div>
        <div class="section-body">
          <div class="field">
            <label>Fecha de referencia <span class="opt">(opcional — para calcular antigüedad del dato)</span></label>
            <input type="date" id="fecha-dato">
          </div>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="btn-submit">Calcular tasación</button>

    </form>
  </div>

  <!-- ── RESULTADO ── -->
  <div class="result-col" id="result-col">

    <!-- 📊 Resultado de la tasación -->
    <div class="result-section" id="result-section">
      <div class="section-header">
        <span class="section-icon">📊</span>
        <span
